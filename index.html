<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenHands</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6f4;
        --ink: #14201a;
        --accent: #1f6b4a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, serif;
        background:
          radial-gradient(circle at top left, #d7ebe0 0%, transparent 45%),
          linear-gradient(160deg, #eef4f0, #f7faf8 55%, #e7efe9);
        color: var(--ink);
      }
      main {
        width: min(560px, calc(100% - 2rem));
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 4rem);
        letter-spacing: -0.04em;
        color: var(--accent);
      }
      p {
        margin: 0.85rem 0 0;
        font-size: 1.05rem;
        line-height: 1.5;
        color: #355043;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenHands</h1>
      <p>Deployed from GitHub on Vercel.</p>
    </main>
  </body>
</html>
